name: 過去ツイート一括インポート（一回限り）

on:
  workflow_dispatch:
    inputs:
      use_user_auth:
        description: 'ユーザー認証を使う（アプリ認証が失敗した場合は true にして TWITTER_CSRF_TOKEN を設定）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 過去ツイートを全件取得
        env:
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_CSRF_TOKEN: ${{ secrets.TWITTER_CSRF_TOKEN }}
        run: node scripts/fetch-older.mjs

      - name: 結果を確認
        run: |
          echo "=== posts.json 件数 ==="
          node -e "const d=require('./public/data/posts.json'); console.log('合計:', d.totalPosts, '件'); const posts=d.posts; console.log('最古:', posts[posts.length-1].publishedAt.slice(0,10)); console.log('最新:', posts[0].publishedAt.slice(0,10));"

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/posts.json
          git diff --staged --quiet || git commit -m "chore: import historical posts [$(date '+%Y-%m-%d')]"
          git push
