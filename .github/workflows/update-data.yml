name: Update Data

on:
  schedule:
    # 毎日 JST 23:00 (UTC 14:00) に実行
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest posts via RSSHub
        env:
          RSSHUB_URL: ${{ vars.RSSHUB_URL }}
          RSSHUB_ACCESS_KEY: ${{ secrets.RSSHUB_ACCESS_KEY }}
        run: node scripts/fetch-posts.mjs

      - name: Fetch latest news via Google Alerts RSS
        env:
          GOOGLE_ALERTS_RSS_URL: ${{ vars.GOOGLE_ALERTS_RSS_URL }}
        run: node scripts/fetch-news.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "chiikawa-observatory[bot]"
          git config user.email "bot@chiikawa-observatory"
          git add public/data/
          git commit -m "chore: update posts data [$(date '+%Y-%m-%d %H:%M JST')]"
          git push
