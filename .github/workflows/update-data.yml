name: Update Data

on:
  schedule:
    # 4時間ごとに実行 (JST 1:00 / 5:00 / 9:00 / 13:00 / 17:00 / 21:00)
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest posts via RSSHub
        id: fetch_posts
        continue-on-error: true
        env:
          RSSHUB_URL: ${{ vars.RSSHUB_URL }}
          RSSHUB_ACCESS_KEY: ${{ secrets.RSSHUB_ACCESS_KEY }}
        run: node scripts/fetch-posts.mjs

      - name: Fetch latest news via Google Alerts RSS
        id: fetch_news
        continue-on-error: true
        env:
          GOOGLE_ALERTS_RSS_URL: ${{ vars.GOOGLE_ALERTS_RSS_URL }}
        run: node scripts/fetch-news.mjs

      - name: Check fetch results
        if: steps.fetch_posts.outcome == 'failure' && steps.fetch_news.outcome == 'failure'
        run: |
          echo "::error::両フェッチスクリプトが失敗しました。RSSHub・Google Alerts の設定を確認してください。"
          exit 1

      - name: Sync fetch failure issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          POSTS_OUTCOME: ${{ steps.fetch_posts.outcome }}
          NEWS_OUTCOME: ${{ steps.fetch_news.outcome }}
        run: |
          TITLE="⚠️ データ更新フェッチ失敗を検知"
          EXISTING=$(gh issue list --repo "$REPO" --search "in:title \"$TITLE\"" --state open --json number --jq '.[0].number')

          if [ "$POSTS_OUTCOME" = "failure" ] || [ "$NEWS_OUTCOME" = "failure" ]; then
            BODY="fetch-posts.mjs: ${POSTS_OUTCOME}
          fetch-news.mjs: ${NEWS_OUTCOME}

          実行ログ: ${RUN_URL}"
            if [ -z "$EXISTING" ]; then
              gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
            else
              gh issue comment "$EXISTING" --repo "$REPO" --body "再発を検知しました。

          $BODY"
            fi
          elif [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --repo "$REPO" --comment "フェッチが正常に成功したためクローズします。実行ログ: ${RUN_URL}"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/ && [ -z "$(git ls-files --others --exclude-standard public/data/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "chiikawa-observatory[bot]"
          git config user.email "bot@chiikawa-observatory"
          git add public/data/
          git commit -m "chore: update posts data [$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')]"
          git push
